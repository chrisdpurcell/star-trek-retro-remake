# Local pre-commit hooks. Versions track the dev dependency floor in
# pyproject.toml; CI re-runs every check, so pre-commit is a fast local
# convenience, not the gate. See docs/design/DESIGN.md §10.6.
#
# After `uv sync --all-extras`, run `uv run pre-commit install` once.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        files: ^src/stmrr/
        additional_dependencies:
          - "pydantic>=2.0"
          - "blinker>=1.8"
          - "loguru>=0.7"
          - "tcod>=21.0"

  - repo: https://github.com/seddonym/import-linter
    rev: v2.11
    hooks:
      - id: import-linter
