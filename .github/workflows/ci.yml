name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a newer commit lands on the same ref —
# saves runner minutes during rebases / force-pushes on feature branches.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: ruff + mypy + import-linter + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Headless Qt for pytest-qt and any QImage snapshot tests
      # (DESIGN.md §10.3). pytest-env reads the same value from
      # pyproject.toml, but we set it at the workflow level too in
      # case anything imports Qt before pytest configures the env.
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv with cache
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Sync project (locked, all extras)
        run: uv sync --all-extras --frozen

      - name: Install xvfb (fallback for tests that need a real display)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb \
              libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy src/stmrr

      - name: import-linter
        run: uv run lint-imports

      - name: pytest
        run: uv run pytest

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: |
            .coverage
            htmlcov/
          if-no-files-found: ignore
          retention-days: 14
